name: fizz_buzz_rust

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'fizz_buzz_rust/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          working_directory: fizz_buzz_rust
      - run: mise run test
        working-directory: fizz_buzz_rust
