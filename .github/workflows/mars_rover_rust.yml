name: mars_rover_rust

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'mars_rover_rust/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          working_directory: mars_rover_rust
      - run: mise run test
        working-directory: mars_rover_rust
