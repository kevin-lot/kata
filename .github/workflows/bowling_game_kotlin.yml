name: bowling_game_kotlin

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'bowling_game_kotlin/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          working_directory: bowling_game_kotlin
      - run: mise run test
        working-directory: bowling_game_kotlin
